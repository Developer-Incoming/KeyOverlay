name: Builder

on:
  push:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"
    - "global_counts.dat"
  pull_request:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"
    - "global_counts.dat"

jobs:
  build:
    strategy:
      matrix:
        os: [ "windows-latest", "ubuntu-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build -o build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KeyOverlay-${{ matrix.os }}
        path: build
    
    - name: Publish
      run: dotnet publish --configuration Release -o publish-output

    - name: Windows Publish
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path publish-output\* -DestinationPath KeyOverlay-${{ matrix.os }}.zip

    - name: Linux/macOS Publish
      if: matrix.os != 'windows-latest'
      run: |
        cd publish-output
        zip -r ../KeyOverlay-${{ matrix.os }}.zip .
    
    - name: Publish
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "*.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "v1.1.${{ github.run_number }}"
        name: "Release v1.1.${{ github.run_number }}"
        body: "Automated build for commit ${{ github.sha }}."
        allowUpdates: true
