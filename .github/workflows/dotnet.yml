name: Builder

on:
  push:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"
    - "global_counts.dat"
  pull_request:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"
    - "global_counts.dat"

jobs:
  build:
    strategy:
      matrix:
        os: [ "windows-latest", "ubuntu-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build -o build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KeyOverlay-${{ matrix.os }}
        path: build
