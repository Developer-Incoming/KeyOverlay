name: Builder

on:
  push:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
    - ".gitignore"
    - ".gitattributes"
    - "LICENSE"
    - "README.md"

jobs:
  build:
    strategy:
      matrix:
        os: [ "windows-latest", "ubuntu-latest", "macos-latest" ]
        configuration: [ Debug, Release ]
    runs-on: ${{ matrix.os }}
    
    env:
      Solution_Name: your-solution-name                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Test_Project_Path: your-test-project-path                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
      Wap_Project_Directory: your-wap-project-directory-name    # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.
      Wap_Project_Path: your-wap-project-path                   # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Add MSBuild to the PATH (Windows only)
    - name: Setup MSBuild.exe
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    # Execute all unit tests across all OS environments
    - name: Execute unit tests
      run: dotnet test

    # Standard .NET build for non-Windows, or as a fallback if not using the full WAP/MSIX pipeline on other OS platforms
    - name: Build (.NET CLI)
      if: matrix.os != 'windows-latest'
      run: dotnet build --configuration ${{ matrix.configuration }} -o build

    # Restore the application using MSBuild (Windows only)
    - name: Restore the application (MSBuild)
      if: matrix.os == 'windows-latest'
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Decode the base 64 encoded pfx and save the Signing_Certificate (Windows only)
    - name: Decode the pfx
      if: matrix.os == 'windows-latest'
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $certificatePath = Join-Path -Path $env:Wap_Project_Directory -ChildPath GitHubActionsWorkflow.pfx
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

    # Create the app package by building and packaging the Windows Application Packaging project (Windows only)
    - name: Create the app package
      if: matrix.os == 'windows-latest'
      run: msbuild $env:Wap_Project_Path /p:Configuration=$env:Configuration /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode /p:AppxBundle=$env:Appx_Bundle /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx /p:PackageCertificatePassword=${{ secrets.Pfx_Key }}
      env:
        Appx_Bundle: Always
        Appx_Bundle_Platforms: x86|x64
        Appx_Package_Build_Mode: StoreUpload
        Configuration: ${{ matrix.configuration }}

    # Remove the pfx (Windows only)
    - name: Remove the pfx
      if: matrix.os == 'windows-latest'
      run: Remove-Item -path $env:Wap_Project_Directory\GitHubActionsWorkflow.pfx

    # Upload MSIX Package if built on Windows
    - name: Upload MSIX Package artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: KeyOverlay-MSIX-${{ matrix.os }}-${{ matrix.configuration }}
        path: ${{ env.Wap_Project_Directory }}\AppPackages

    # Upload standard cross-platform build artifacts if built on Linux/macOS
    - name: Upload Cross-Platform Build artifacts
      if: matrix.os != 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: KeyOverlay-${{ matrix.os }}-${{ matrix.configuration }}
        path: build
